# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Test

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET 6.x
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.x'
    - name: Display dotnet version
      run: dotnet --version
    - name: Install dotnet tools
      run: dotnet tool install -g docfx --version 2.61.0
    - name: Disply doxfx version
      run: |
        docfx --version
        dotnet --list-sdks

    - name: Git clone TizenFX
      uses: actions/checkout@v3
      with:
        repository: shyunMin/TizenFX
        ref: 'tizenfx-docs'
    - name: Build TizenFX sources
      run: |
        ./build.sh clone
        ./build.sh restore
        ./build.sh build
    - name: Archive Artifacts
      run: |
        tar xvfz site.tar.gz _site/
    - uses: action/upload-artifact@v2
      with:
        name: documents
        path: site.tar.gz
